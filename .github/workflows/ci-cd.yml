# ─────────────────────────────────────────────────────────────────────────────
# CI/CD Pipeline — Course Advisor Agent
#
# TRIGGERS:
#   • Push to `main`  → full pipeline (lint → test → build → deploy to HF)
#   • Pull Request    → lint + test only (no deployment)
#   • Manual dispatch → full pipeline with optional force-deploy flag
#
# JOBS:
#   1. lint     — ruff check + format check (fast, <30s)
#   2. test     — pytest with mocked dependencies (no real API calls)
#   3. build    — docker buildx build + push to GHCR
#   4. deploy   — push to HuggingFace Spaces via git or HF API
#
# SECRETS REQUIRED (set in GitHub repo → Settings → Secrets → Actions):
#   GROQ_API_KEY          — Groq API key for the agent LLM
#   HF_TOKEN              — HuggingFace token with write access to the Space
#
# VARIABLES REQUIRED (set in GitHub repo → Settings → Secrets and variables → Variables):
#   HF_SPACE_ID           — e.g. "OmarFadlallah/Scientific-Operating-System"
#                           (owner/space-name format) — not sensitive, use Variables
#
# OPTIONAL SECRETS:
#   COHERE_API_KEY        — only needed if RERANKER_BACKEND=cohere
# ─────────────────────────────────────────────────────────────────────────────

name: CI/CD — Course Advisor Agent

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_deploy:
        description: "Force deploy even if tests fail (emergency hotfix)"
        required: false
        default: "false"

# Cancel in-progress runs for the same branch (saves Actions minutes)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/course-advisor-agent

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1: Lint
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-lint-${{ hashFiles('pyproject.toml') }}

      - name: Install ruff
        run: pip install "ruff>=0.4"

      - name: Lint (ruff check)
        run: ruff check app/ tests/

      - name: Format check (ruff format --check)
        run: ruff format --check app/ tests/

